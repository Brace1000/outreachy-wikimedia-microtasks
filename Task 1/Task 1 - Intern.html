<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>bobaigwa - Task 1 (Final Improved Version)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .article-card {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      background: #f9f9f9;
    }

    .meta {
      font-size: 0.9em;
      color: #555;
    }

    #summary {
      margin: 10px 0;
      font-weight: bold;
    }

    .empty {
      color: #888;
      font-style: italic;
    }
  </style>
</head>

<body>

  <h1>bobaigwa - Task 1</h1>

  <!-- Sorting Control -->
  <label for="sort">Sort by date: </label>
  <select id="sort">
    <option value="newest">Newest First</option>
    <option value="oldest">Oldest First</option>
  </select>

  <div id="summary"></div>
  <div id="results"></div>

  <script>
    /* ── DATA ───────────────────────────────────────────── */
    const data = [
      {"page_id": 6682420, "creation_date": "2021-09-13", "title": "André Baniwa"},
      {"page_id": 4246775, "creation_date": "2013-12-10", "title": "Benki Piyãko"},
      {"page_id": 5882073, "creation_date": "2018-12-03", "title": "Célia Xakriabá"},
      {"page_id": 6977673, "creation_date": "2022-10-05", "title": "Chirley Pankará"},
      {"page_id": 7069044, "creation_date": "2023-02-16", "title": "Cristine Takuá"},
      {"page_id": 2119511, "creation_date": "2009-01-28", "title": "Eliane Potiguara"},
      {"page_id": 6714407, "creation_date": "2021-10-09", "title": "Jaider Esbell"},
      {"page_id": 6977117, "creation_date": "2022-10-04", "title": "Jerônimo Rodrigues"},
      {"page_id": 6935831, "creation_date": "2022-08-02", "title": "Nanblá Gakran"},
      {"page_id": 4908665, "creation_date": "2015-11-13", "title": "Sônia Guajajara"},
      {"page_id": 5886895, "creation_date": "2018-12-12", "title": "Vãngri Kaingáng"},
      {"page_id": 6549130, "creation_date": "2021-04-10", "title": "Zezico Guajajara"},
    ];

    /* ── DOM REFERENCES ─────────────────────────────────── */
    const resultsDiv = document.getElementById("results");
    const sortSelect = document.getElementById("sort");
    const summaryDiv = document.getElementById("summary");

    /* ── UTILITIES (Validation + Formatting + Sorting) ─── */

    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split("-").map(Number);
      const date = new Date(year, month - 1, day);

      return date.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric",
      });
    }

    function isValidArticle(article) {
      return (
        article &&
        typeof article.title === "string" &&
        typeof article.page_id === "number" &&
        typeof article.creation_date === "string" &&
        article.creation_date.includes("-")
      );
    }

    function sortData(list, order) {
      return [...list].sort((a, b) => {
        const dateA = new Date(a.creation_date);
        const dateB = new Date(b.creation_date);
        return order === "newest" ? dateB - dateA : dateA - dateB;
      });
    }

    /* ── UI CREATION (Refactored DOM logic) ─────────────── */

    function createArticleCard(article) {
      const div = document.createElement("div");
      div.className = "article-card";

      div.innerHTML = `
        <div><strong>${article.title}</strong></div>
        <div class="meta">Page ID: ${article.page_id}</div>
        <div class="meta">Created: ${formatDate(article.creation_date)}</div>
      `;

      return div;
    }

    /* ── RENDERING LOGIC ───────────────────────────────── */

    function clearUI() {
      resultsDiv.innerHTML = "";
      summaryDiv.innerHTML = "";
    }

    function showEmptyState() {
      resultsDiv.innerHTML = "<div class='empty'>No valid articles to display.</div>";
    }

    function updateSummary(count) {
      summaryDiv.textContent = `Showing ${count} article(s)`;
    }

    function renderArticles(list) {
      clearUI();

      const validArticles = list.filter(isValidArticle);

      if (validArticles.length === 0) {
        showEmptyState();
        return;
      }

      validArticles.forEach(article => {
        resultsDiv.appendChild(createArticleCard(article));
      });

      updateSummary(validArticles.length);
    }

    /* ── CONTROLLER ─────────────────────────────────────── */

    function updateView() {
      const sorted = sortData(data, sortSelect.value);
      renderArticles(sorted);
    }

    /* ── INIT ───────────────────────────────────────────── */

    function init() {
      sortSelect.addEventListener("change", updateView);
      updateView();
    }

    init();
  </script>

</body>
</html>
